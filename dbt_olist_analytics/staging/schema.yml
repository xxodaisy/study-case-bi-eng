#models/staging/schema.yml
version: 2

models:
  - name: stg_orders
    description: "This table contains the raw data of orders from the Olist dataset. It serves as a staging table for further transformations and analysis."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Unique identifier for each customer who placed the order."
        tests:
          - not_null

  - name: stg_customers
    description: "This table contains the raw data of customers from the Olist dataset. It serves as a staging table for further transformations and analysis."
    columns:
      - name: customer_id
        description: "Unique identifier for each customer."
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "This table contains the raw data of products from the Olist dataset. It serves as a staging table for further transformations and analysis."
    columns:
      - name: product_id
        description: "Unique identifier for each product."
        tests:
          - unique
          - not_null

  - name: stg_order_items
    description: "This table contains the raw data of order items from the Olist dataset. It serves as a staging table for further transformations and analysis."
    columns:
      - name: order_item_id
        description: "Unique identifier for each order item."
        tests:
          - not_null
      - name: order_id
        description: "Identifier for the order to which the item belongs."
        tests:
          - not_null
      - name: product_id
        description: "Identifier for the product in the order item."
        tests:
          - not_null
      - name: price
        description: "Price of the product in the order item."
        tests:
          - not_null

  - name: stg_order_reviews
    description: "This table contains the raw data of order reviews from the Olist dataset. It serves as a staging table for further transformations and analysis."
    columns:
      - name: review_id
        description: "Unique identifier for each review."
        tests:
          - not_null
      - name: order_id
        description: "Identifier for the order to which the review belongs."
        tests:
          - not_null
      - name: rating
        description: "Score given by the customer in the review."
        tests:
          - not_null

  - name: stg_category_translation
    description: "This table contains the raw data of category translations from the Olist dataset. It serves as a staging table for further transformations and analysis."
    columns:
      - name: category_name_english
        description: "Name of the category."
        tests:
          - not_null
